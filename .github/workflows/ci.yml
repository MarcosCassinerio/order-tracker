name: CI

on:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: Test order-service ────────────────────────────────────────────────
  test-order-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: mvn test -Dtest="OrderServiceTest,PricingStrategyTest,OrderStatusTest,OrderControllerTest"
        working-directory: order-service

      - name: Run integration tests
        run: mvn test -Dtest="OrderServiceIntegrationTest"
        working-directory: order-service

  # ── Job 2: Test inventory-service ───────────────────────────────────────────
  test-inventory-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: mvn test -Dtest="ProductServiceTest,ProductControllerTest"
        working-directory: inventory-service

      - name: Run integration tests
        run: mvn test -Dtest="ProductServiceIntegrationTest"
        working-directory: inventory-service

  # ── Job 3: Build & Push order-service image ──────────────────────────────────
  build-and-push-order-service:
    runs-on: ubuntu-latest
    needs: test-order-service
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/order-service:latest" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: order-service
          push: true
          tags: ${{ env.IMAGE }}

  # ── Job 4: Build & Push inventory-service image ──────────────────────────────
  build-and-push-inventory-service:
    runs-on: ubuntu-latest
    needs: test-inventory-service
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/inventory-service:latest" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: inventory-service
          push: true
          tags: ${{ env.IMAGE }}
