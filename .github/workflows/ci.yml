name: CI

on:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven        # caches ~/.m2 between runs so Maven doesn't re-download deps

      - name: Run unit tests
        run: mvn test -Dtest="OrderServiceTest,PricingStrategyTest,OrderStatusTest,OrderControllerTest"

      - name: Run integration tests
        run: mvn test -Dtest="OrderServiceIntegrationTest"
        # Testcontainers works here because GitHub Actions runners have Docker installed

  # ── Job 2: Build & Push Docker image ────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test             # only runs if the test job passes
    if: github.ref == 'refs/heads/main'   # only runs on pushes to main

    permissions:
      contents: read
      packages: write       # required to push to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatically provided by GitHub, no setup needed

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
