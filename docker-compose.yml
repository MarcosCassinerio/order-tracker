services:
  # credentials are loaded from .env (git-ignored). Copy .env.example → .env to get started.

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       orders
      POSTGRES_USER:     app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"       # expose to host so you can connect with a DB client (DBeaver, psql, etc.)
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persist data between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d orders"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"    # AMQP port (used by services)
      - "15672:15672"  # management UI: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── order-service ────────────────────────────────────────────────────────────
  app:
    build: order-service
    ports:
      - "8080:8080"
    environment:
      DB_URL:            jdbc:postgresql://postgres:5432/orders
      DB_USERNAME:       app
      DB_PASSWORD:       secret
      RABBITMQ_HOST:     rabbitmq
      INVENTORY_SERVICE_URL: http://inventory-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── inventory-service ────────────────────────────────────────────────────────
  inventory-service:
    build: inventory-service
    ports:
      - "8081:8081"
    environment:
      DB_URL:      jdbc:postgresql://postgres:5432/orders
      DB_USERNAME: app
      DB_PASSWORD: secret
    depends_on:
      postgres:
        condition: service_healthy

  # ── notification-service ─────────────────────────────────────────────────────
  notification-service:
    build: notification-service
    ports:
      - "8082:8082"
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
