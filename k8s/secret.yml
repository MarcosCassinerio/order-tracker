# Secret for order-service namespace
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
  namespace: order-service
type: Opaque
# Values must be base64 encoded. To encode: echo -n "myvalue" | base64
# app     → YXBw
# secret  → c2VjcmV0
# orders  → b3JkZXJz
data:
  db-username: YXBw
  db-password: c2VjcmV0
  db-name:     b3JkZXJz

---
# Secret for inventory-service namespace
apiVersion: v1
kind: Secret
metadata:
  name: inventory-service-secret
  namespace: inventory-service
type: Opaque
# app       → YXBw
# secret    → c2VjcmV0
# inventory → aW52ZW50b3J5
data:
  db-username: YXBw
  db-password: c2VjcmV0
  db-name:     aW52ZW50b3J5
